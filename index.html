<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alonso Arrunategui</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Alonso Arrunategui</h1>
        <hr>
    </header>

    <main class="desktop">
        <div class="folder-grid">
            <div class="folder"><div class="folder-icon"><span>alonso</span></div></div>
            <div class="folder"><div class="folder-icon"><span>blog</span></div></div>
            <div class="folder"><div class="folder-icon"><span>projects</span></div></div>
            <div class="folder"><div class="folder-icon"><span>gallery</span></div></div>
            <div class="folder"><div class="folder-icon"><span>inbox</span></div></div>
            <div class="folder"><div class="folder-icon"><span>trash</span></div></div>
        </div>
    </main>

    <footer>
        <p id="clock">friday, may 8th | 3:28 PM</p>
    </footer>

    <script>
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true };
            document.getElementById('clock').innerHTML = now.toLocaleString('en-US', options).toLowerCase();
        }
        // Update it every second
        setInterval(updateClock, 1000);
        updateClock(); // Run it immediately
    </script>

</body>
</html>
